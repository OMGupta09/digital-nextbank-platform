server:
  port: 8081

spring:
  application:
    name: auth-service

  spring:
    application:
      name: auth-service

  eureka:
    client:
      service-url:
        defaultZone: http://localhost:8761/eureka

  datasource:
    url: jdbc:mysql://localhost:3312/auth_db
    username: root
    password: rootPASSWORD

