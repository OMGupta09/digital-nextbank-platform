server:
  port: 8085

spring:
  application:
    name: notification-service

  kafka:
    bootstrap-servers: localhost:9092

    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: >
          com.ogbuilds.digitalbank.transaction.dto.event.TransactionCompletedEvent:com.ogbuilds.digitalbank.notification.dto.event.TransactionCompletedEvent,
          com.ogbuilds.digitalbank.transaction.dto.event.TransactionFailedEvent:com.ogbuilds.digitalbank.notification.dto.event.TransactionFailedEvent

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info