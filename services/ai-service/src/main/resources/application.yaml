server:
  port: 8086

spring:
  application:
    name: ai-service

  ai:
    openai:
      api-key: ${OPENROUTER_API_KEY}
      base-url: https://openrouter.ai/api

      chat:
        completions-path: /v1/chat/completions

        options:
          model: google/gemini-2.5-flash
          max-tokens: 512
          temperature: 0.7

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info